name: CI/CD Pipeline

on:
  workflow_dispatch:    # 允许手动触发
  push:
    branches:
      - main
      - staging
      - develop
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'source/**'
  pull_request:
    branches:
      - main
      - staging
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'source/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Run build script
        run: |
          echo "Running build script..."
          echo "Checking if build cache is available..."
          ./build.sh
        env:
          NODE_ENV: production
          BUILD_MODE: ${{ github.ref == 'refs/heads/main' ? 'production' : 'staging' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install frontend dependencies
        run: |
          echo "Installing frontend dependencies..."
          echo "Checking if npm cache is available..."
          npm cache verify || echo "npm cache verification skipped"
          cd frontend && npm install --verbose

      - name: Run frontend lint
        run: |
          echo "Running frontend lint..."
          cd frontend && npm run lint

      - name: Run frontend tests
        run: |
          echo "Running frontend tests..."
          cd frontend && npm run test
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          echo "Installing Python dependencies..."
          echo "Checking pip version..."
          pip --version
          echo "Installing dependencies from requirements.txt..."
          pip install -r requirements.txt --verbose

      - name: Install pytest
        run: pip install pytest

      - name: Run Python tests
        run: python -m pytest test/ -v || echo "No tests found or tests failed, continuing build"

  deploy-staging:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv-spider-staging
          directory: dist
          branch: staging
          environment: staging

      - name: Notify deployment status
        if: success()
        run: |
          echo "Staging deployment completed successfully!"
          echo "Frontend deployed to Cloudflare Pages staging environment"

  deploy-production:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: spider-iptv
          directory: dist
          branch: main
          environment: production

      - name: Notify deployment status
        if: success()
        run: |
          echo "Production deployment completed successfully!"
          echo "Frontend deployed to Cloudflare Pages production environment"

  deploy-python-backend:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          # 升级 pip
          python -m pip install --upgrade pip
          # 安装 wheel 以支持预编译包
          python -m pip install wheel
          # 安装 lxml 的预编译包
          python -m pip install lxml --only-binary=lxml
          # 安装其他依赖
          python -m pip install -r requirements.txt

      - name: Deploy Python backend to Vercel
        run: |
          # Install Vercel CLI
          npm install -g vercel
          
          # Deploy to Vercel
          # Note: This requires VERCEL_TOKEN to be set in GitHub Secrets
          if [ -n "$VERCEL_TOKEN" ]; then
            if [ "$GITHUB_REF" == "refs/heads/main" ]; then
              vercel --token $VERCEL_TOKEN --prod
            else
              vercel --token $VERCEL_TOKEN
            fi
          else
            echo "VERCEL_TOKEN not set, skipping deployment"
            echo "To deploy to Vercel, set VERCEL_TOKEN in GitHub Secrets"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_REF: ${{ github.ref }}

      - name: Run main.py script (initial crawl)
        run: |
          # 验证 Python 环境
          echo "Python version: $(python --version)"
          echo "Python path: $(which python)"
          
          # 检查依赖项
          echo "Checking dependencies..."
          python -c "import requests; print('requests:', requests.__version__)"
          python -c "import bs4; print('beautifulsoup4:', bs4.__version__)"
          python -c "import lxml; print('lxml:', lxml.__version__)"
          
          # Run the main.py script to perform initial crawl
          # This will download sources, process channels, and generate playlists
          echo "Running initial IPTV spider crawl..."
          python main.py --initial-crawl
        continue-on-error: true

      - name: Check script execution results
        run: |
          # 检查脚本执行日志和输出文件
          echo "Checking script execution results..."
          if [ -f "playlist.m3u" ]; then
            echo "Playlist generated successfully: $(ls -la playlist.m3u)"
            echo "First 10 lines of playlist:"
            head -n 10 playlist.m3u
          else
            echo "Warning: Playlist file not found"
          fi
          
          # 检查日志文件
          if [ -f "iptv_spider.log" ]; then
            echo "Log file found: $(ls -la iptv_spider.log)"
            echo "Last 20 lines of log:"
            tail -n 20 iptv_spider.log
          else
            echo "Info: Log file not found (using console output)"
          fi

  notify:
    needs: [deploy-staging, deploy-production, deploy-python-backend]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check deployment statuses
        run: |
          echo "Checking deployment statuses..."
          echo "Build status: ${{ needs.build.result }}"
          echo "Test status: ${{ needs.test.result }}"
          echo "Staging deployment status: ${{ needs.deploy-staging.result }}"
          echo "Production deployment status: ${{ needs.deploy-production.result }}"
          echo "Backend deployment status: ${{ needs.deploy-python-backend.result }}"

      - name: Send deployment notification
        if: success()
        run: |
          echo "All deployments completed successfully!"
          echo "Frontend deployed to Cloudflare Pages"
          echo "Backend deployed to Vercel"
          echo "Initial crawl completed"
          echo "Deployment summary:"
          echo "- Branch: ${{ github.ref_name }}"
          echo "- Commit: ${{ github.sha }}"
          echo "- Author: ${{ github.actor }}"
          echo "- Timestamp: ${{ github.event.head_commit.timestamp }}"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_HEAD_COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
