name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Run build script
        run: ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test -- --passWithNoTests

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest test/ --pass-with-no-tests

  deploy-staging:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv-spider-staging
          directory: dist
          branch: staging

  deploy-production:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv-spider
          directory: dist
          branch: main

  deploy-python-backend:
    needs: [build, test, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 升级 pip
          python -m pip install --upgrade pip
          # 安装 wheel 以支持预编译包
          python -m pip install wheel
          # 安装 lxml 的预编译包
          python -m pip install lxml --only-binary=lxml
          # 安装其他依赖
          python -m pip install -r requirements.txt

      - name: Deploy Python backend to Vercel
        run: |
          # Install Vercel CLI
          npm install -g vercel
          
          # Deploy to Vercel
          # Note: This requires VERCEL_TOKEN to be set in GitHub Secrets
          if [ -n "$VERCEL_TOKEN" ]; then
            vercel --token $VERCEL_TOKEN --prod
          else
            echo "VERCEL_TOKEN not set, skipping deployment"
            echo "To deploy to Vercel, set VERCEL_TOKEN in GitHub Secrets"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Run main.py script (initial crawl)
        run: |
          # 验证 Python 环境
          echo "Python version: $(python --version)"
          echo "Python path: $(which python)"
          
          # 检查依赖项
          echo "Checking dependencies..."
          python -c "import requests; print('requests:', requests.__version__)"
          python -c "import bs4; print('beautifulsoup4:', bs4.__version__)"
          python -c "import lxml; print('lxml:', lxml.__version__)"
          
          # Run the main.py script to perform initial crawl
          # This will download sources, process channels, and generate playlists
          echo "Running initial IPTV spider crawl..."
          python main.py --initial-crawl
        continue-on-error: true

      - name: Check script execution results
        run: |
          # 检查脚本执行日志和输出文件
          echo "Checking script execution results..."
          if [ -f "playlist.m3u" ]; then
            echo "Playlist generated successfully: $(ls -la playlist.m3u)"
            echo "First 10 lines of playlist:"
            head -n 10 playlist.m3u
          else
            echo "Warning: Playlist file not found"
          fi
          
          # 检查日志文件
          if [ -f "iptv_spider.log" ]; then
            echo "Log file found: $(ls -la iptv_spider.log)"
            echo "Last 20 lines of log:"
            tail -n 20 iptv_spider.log
          else
            echo "Info: Log file not found (using console output)"
          fi

